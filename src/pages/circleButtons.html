<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <div class="number-line"></div>
        <div class="top-arrow-line"></div>
        <div class="bottom-arrow-line"><div>
        <title>Circle Buttons</title>
        <style>
            .circle-button {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                border: none;
                position:relative;
                margin-left: 15px;
                left: 25px;
                margin-right: 30px;
                background-color: #4CAF50;
                color: rgb(255, 255, 255);
                text-align: center;
                line-height: 50px;
                font-size: 16px;
                cursor: pointer;
            }
            .circle-button:hover {
                background-color: #45a049;
            }
            .number-line {
                width: 500px;
                height: 22.5px;
                border-bottom: 4px solid black;
                position: absolute;
                left: 15px;
                color: black;
                /*transform: translateY(300px)*/
            }
            .top-arrow-line {
                width: 50px;
                height: 22.5px;
                border-bottom: 4px solid black;
                color: black;
                position: absolute;
                left: 0px;
                transform: rotate(-45deg) translateY(-10px) translateX(12px);
            }
            .bottom-arrow-line {
                width: 50px;
                height: 22.5px;
                border-bottom: 4px solid black;
                color: black;
                position: absolute;
                left: 0px;
                transform: rotate(45deg) translateY(10px) translateX(12px);
            }
        </style>
    </head>

   <body>
        <div class = circle-buttons>
        <button class="circle-button">0%</button>
        <button class="circle-button">25%</button>
        <button class="circle-button">50%</button>
        <button class="circle-button">75%</button>
        <button class="circle-button">95%</button>
        <button class="circle-button">100%</button>
        </div>
    </body> 
</html>
